<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Teleprompter Pro</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@300;400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0f;
  --surface: #111118;
  --surface2: #18181f;
  --border: rgba(255,255,255,0.07);
  --accent: #e8d5a3;
  --accent2: #7c6fff;
  --text: #f0ede6;
  --muted: rgba(240,237,230,0.35);
  --red: #ff4444;
  --green: #5fff9a;
  --radius: 10px;
}

html, body { height: 100%; overflow: hidden; background: var(--bg); }
body { color: var(--text); font-family: 'Outfit', sans-serif; display: flex; flex-direction: column; }

/* ══ TOOLBAR ══ */
.toolbar {
  display: flex; align-items: center; gap: 7px;
  padding: 9px 14px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0; flex-wrap: wrap;
}
.logo { font-family: 'DM Serif Display', serif; font-size: 1.1rem; color: var(--accent); margin-right: 2px; white-space: nowrap; }

.mode-tabs { display: flex; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 3px; gap: 2px; }
.mode-tab { padding: 4px 11px; border-radius: 5px; border: none; background: transparent; color: var(--muted); font-family: 'Outfit', sans-serif; font-size: 0.72rem; font-weight: 500; cursor: pointer; white-space: nowrap; transition: all 0.2s; }
.mode-tab.active { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }

.ctrl-group { display: flex; align-items: center; gap: 5px; font-size: 0.72rem; color: var(--muted); }
input[type="range"] { -webkit-appearance: none; width: 72px; height: 3px; background: var(--border); border-radius: 2px; outline: none; }
input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 13px; height: 13px; border-radius: 50%; background: var(--accent); cursor: pointer; }
.ctrl-val { font-family: 'JetBrains Mono', monospace; font-size: 0.68rem; color: var(--accent); min-width: 24px; }

.btn { padding: 6px 13px; border-radius: 7px; border: 1px solid var(--border); font-family: 'Outfit', sans-serif; font-size: 0.73rem; font-weight: 500; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
.btn-primary { background: var(--accent); color: #0a0a0f; border-color: var(--accent); }
.btn-primary:hover { background: #f5e4b8; }
.btn-danger  { background: transparent; color: var(--red); border-color: var(--red); }
.btn-danger:hover { background: rgba(255,68,68,0.1); }
.btn-ghost   { background: transparent; color: var(--muted); border-color: transparent; }
.btn-ghost:hover { color: var(--text); }
.btn-purple  { background: transparent; color: var(--accent2); border-color: var(--accent2); }
.btn-purple:hover { background: rgba(124,111,255,0.1); }
.btn-save    { background: var(--accent); color: #0a0a0f; border-color: var(--accent); }
.btn-save:hover { background: #f5e4b8; }
.btn-cam     { background: transparent; color: var(--muted); border: 1px solid var(--border); }
.btn-cam.cam-on { color: var(--green); border-color: var(--green); background: rgba(95,255,154,0.07); }

.icon-btn { width: 28px; height: 28px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; transition: all 0.15s; }
.icon-btn:hover { color: var(--text); }

/* divider between toolbar sections */
.tbdiv { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }

/* ══ ROOT LAYOUT ══ */
/* camera=none  → prompt fills everything
   camera=split → prompt top, cam bottom (portrait)
   camera=side  → prompt left, cam right (landscape)
   camera=pip   → prompt fills, cam floats bottom-right */

.root-layout {
  flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0;
  position: relative;
}

/* SPLIT (portrait): teleprompter top, camera bottom */
.root-layout.cam-split { flex-direction: column; }
/* SIDE (landscape): teleprompter left, camera right */
.root-layout.cam-side  { flex-direction: row; }
/* PIP: no layout change, cam floats */
.root-layout.cam-pip   { flex-direction: column; }

/* ══ TELEPROMPTER PANEL ══ */
.prompt-panel {
  flex: 1; position: relative; overflow: hidden;
  display: flex; flex-direction: column; min-height: 0; min-width: 0;
}

/* STATUS BAR */
.status-bar {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 14px;
  background: var(--surface); border-bottom: 1px solid var(--border);
  font-size: 0.7rem; flex-shrink: 0; flex-wrap: wrap;
}
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); flex-shrink: 0; transition: all 0.3s; }
.status-dot.listening { background: var(--green); box-shadow: 0 0 7px var(--green); animation: sdpulse 1.5s infinite; }
.status-dot.scrolling { background: var(--accent); box-shadow: 0 0 7px var(--accent); }
.status-dot.done { background: var(--green); }
@keyframes sdpulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.status-text { color: var(--muted); }
.waveform { display: flex; align-items: center; gap: 2px; height: 13px; }
.wave-bar { width: 2px; background: var(--green); border-radius: 1px; height: 3px; opacity: 0.3; }
.wave-active .wave-bar { opacity: 1; animation: wv 0.6s infinite ease-in-out; }
.wave-bar:nth-child(2) { animation-delay:.1s!important } .wave-bar:nth-child(3) { animation-delay:.2s!important } .wave-bar:nth-child(4) { animation-delay:.1s!important }
@keyframes wv { 0%,100%{height:3px} 50%{height:12px} }
.heard-text { font-family:'JetBrains Mono',monospace; font-size:0.65rem; color:var(--accent2); max-width:180px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.prog-wrap { margin-left:auto; display:flex; align-items:center; gap:7px; }
.prog-bg { width:80px; height:3px; background:var(--border); border-radius:2px; overflow:hidden; }
.prog-fill { height:100%; background:var(--accent); border-radius:2px; width:0%; transition:width .4s; }
.prog-pct { font-family:'JetBrains Mono',monospace; font-size:0.65rem; color:var(--muted); min-width:28px; }

.focus-line { position:absolute; left:0; right:0; height:2px; background:linear-gradient(to right,transparent,var(--accent) 25%,var(--accent) 75%,transparent); opacity:0; pointer-events:none; z-index:20; transition:opacity .4s; top:40%; }
.focus-line.show { opacity:0.4; }
.fade-top,.fade-bot { position:absolute; left:0; right:0; height:70px; pointer-events:none; z-index:10; }
.fade-top { top:0; background:linear-gradient(to bottom,var(--bg),transparent); }
.fade-bot { bottom:0; background:linear-gradient(to top,var(--bg),transparent); }

.scroll-wrap { flex:1; overflow-y:scroll; overflow-x:hidden; min-height:0; }
.scroll-wrap::-webkit-scrollbar { display:none; }

.script-area { padding:40vh 8vw; max-width:900px; margin:0 auto; width:100%; }
.script-content { font-family:'DM Serif Display',serif; font-size:2.2rem; line-height:1.8; text-align:center; white-space:pre-wrap; }

.w { display:inline; }
.w.spoken  { color:var(--muted); }
.w.current { color:var(--accent); text-shadow:0 0 25px rgba(232,213,163,.5); }
.w.upcoming{ color:var(--text); }

/* EDITOR */
.editor-overlay { position:absolute; inset:0; background:var(--bg); z-index:50; flex-direction:column; padding:18px; gap:12px; display:none; }
.editor-overlay.open { display:flex; }
.editor-title { font-family:'DM Serif Display',serif; font-size:1.1rem; color:var(--accent); }
.editor-ta { flex:1; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); color:var(--text); font-family:'Outfit',sans-serif; font-size:.95rem; line-height:1.7; padding:16px; resize:none; outline:none; }
.editor-ta:focus { border-color:rgba(255,255,255,.18); }
.editor-acts { display:flex; gap:8px; justify-content:flex-end; }

/* ══ CAMERA PANEL ══ */
/* default hidden */
.cam-panel {
  display: none;
  background: #000;
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
}

/* SPLIT: panel below, fixed height, draggable */
.cam-split .cam-panel {
  display: block;
  height: 35vh;
  min-height: 80px;
  width: 100%;
}
/* SIDE: panel right, fixed width */
.cam-side .cam-panel {
  display: block;
  width: 38vw;
  min-width: 120px;
  height: 100%;
}
/* PIP: floating over teleprompter */
.cam-pip .cam-panel {
  display: block;
  position: absolute;
  bottom: 24px;
  right: 16px;
  width: 200px;
  height: 150px;
  border-radius: 12px;
  border: 2px solid rgba(255,255,255,0.15);
  z-index: 30;
  box-shadow: 0 8px 32px rgba(0,0,0,.7);
  /* PIP is draggable */
  cursor: move;
}

#camVideo { width:100%; height:100%; object-fit:cover; display:block; }
.cam-mirror #camVideo { transform:scaleX(-1); }

/* cam off placeholder */
.cam-off { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; color:var(--muted); font-size:.82rem; pointer-events:all; }
.cam-off-icon { font-size:2rem; opacity:.25; }

/* cam overlay */
.cam-overlay { position:absolute; inset:0; pointer-events:none; }
.rec-badge { position:absolute; top:10px; left:10px; display:flex; align-items:center; gap:5px; background:rgba(0,0,0,.55); backdrop-filter:blur(4px); padding:3px 9px; border-radius:20px; font-size:.68rem; font-weight:600; color:#fff; opacity:0; transition:opacity .3s; pointer-events:none; }
.rec-badge.show { opacity:1; }
.rec-dot { width:7px; height:7px; border-radius:50%; background:var(--red); animation:rp 1s infinite; }
@keyframes rp { 0%,100%{opacity:1} 50%{opacity:.3} }
.rec-timer { position:absolute; top:10px; right:10px; font-family:'JetBrains Mono',monospace; font-size:.72rem; color:#fff; background:rgba(0,0,0,.5); backdrop-filter:blur(4px); padding:2px 8px; border-radius:20px; opacity:0; transition:opacity .3s; pointer-events:none; }
.rec-timer.show { opacity:1; }

/* cam bottom bar — hide in PIP to save space */
.cam-bar { position:absolute; bottom:0; left:0; right:0; display:flex; align-items:center; justify-content:space-between; padding:8px 12px; background:linear-gradient(to top,rgba(0,0,0,.7),transparent); gap:6px; pointer-events:all; }
.cam-pip .cam-bar { display:none; }

/* PIP controls shown on hover */
.pip-controls { display:none; position:absolute; top:6px; right:6px; gap:4px; pointer-events:all; }
.cam-pip .cam-panel:hover .pip-controls { display:flex; }
.pip-btn { width:24px; height:24px; border-radius:50%; border:none; background:rgba(0,0,0,.6); color:#fff; font-size:.65rem; cursor:pointer; display:flex; align-items:center; justify-content:center; }

/* record button */
.rec-btn { width:38px; height:38px; border-radius:50%; border:3px solid #fff; background:var(--red); cursor:pointer; transition:transform .15s,background .2s; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
.rec-btn:hover { transform:scale(1.08); }
.rec-btn.recording { background:#fff; }
.rec-btn.recording::after { content:''; width:14px; height:14px; border-radius:3px; background:var(--red); }

.cam-btn { padding:4px 11px; border-radius:20px; border:1px solid rgba(255,255,255,.3); background:rgba(0,0,0,.4); color:#fff; font-family:'Outfit',sans-serif; font-size:.68rem; cursor:pointer; backdrop-filter:blur(4px); transition:background .2s; white-space:nowrap; }
.cam-btn:hover { background:rgba(0,0,0,.6); }
.cam-btn.active { background:rgba(255,255,255,.15); border-color:rgba(255,255,255,.6); }

.download-btn { padding:4px 11px; border-radius:20px; border:1px solid rgba(255,255,255,.3); background:rgba(0,0,0,.4); color:#fff; font-size:.68rem; cursor:pointer; font-family:'Outfit',sans-serif; backdrop-filter:blur(4px); display:none; white-space:nowrap; text-decoration:none; }
.download-btn.show { display:block; }

/* RESIZE HANDLE (split & side) */
.resize-handle { background:var(--border); cursor:ns-resize; flex-shrink:0; position:relative; transition:background .2s; }
.cam-split .resize-handle { height:6px; width:100%; cursor:ns-resize; }
.cam-side  .resize-handle { width:6px; height:100%; cursor:ew-resize; }
.resize-handle:hover,.resize-handle.dragging { background:var(--accent); }
.resize-handle::after { content:''; position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); border-radius:1px; background:rgba(255,255,255,.2); }
.cam-split .resize-handle::after { width:30px; height:2px; }
.cam-side  .resize-handle::after { width:2px; height:30px; }

/* cam layout picker in toolbar */
.cam-layout-tabs { display:none; background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:3px; gap:2px; }
.cam-layout-tabs.show { display:flex; }
.cam-layout-tab { padding:4px 9px; border-radius:5px; border:none; background:transparent; color:var(--muted); font-family:'Outfit',sans-serif; font-size:.7rem; cursor:pointer; white-space:nowrap; transition:all .2s; }
.cam-layout-tab.active { background:var(--surface2); color:var(--text); border:1px solid var(--border); }

@media (max-width:500px) {
  .script-content { font-size:1.5rem; }
  .toolbar { padding:8px 10px; gap:5px; }
}
</style>
</head>
<body>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="logo">📽 Teleprompter</div>

  <!-- scroll mode -->
  <div class="mode-tabs">
    <button class="mode-tab active" id="tabSpeech" onclick="setMode('speech')">🎙 Suara</button>
    <button class="mode-tab" id="tabFixed" onclick="setMode('fixed')">⏩ Tetap</button>
  </div>

  <div class="ctrl-group" id="speedGroup" style="display:none">
    <label>Kec.</label>
    <input type="range" id="speedSlider" min="10" max="250" value="60" oninput="onSpeedChange()">
    <span class="ctrl-val" id="speedVal">60</span>
  </div>
  <div class="ctrl-group" id="sensGroup">
    <label>Sens.</label>
    <input type="range" id="sensSlider" min="1" max="10" value="5" oninput="onSensChange()">
    <span class="ctrl-val" id="sensVal">5</span>
  </div>

  <div style="display:flex;gap:4px;align-items:center">
    <button class="icon-btn" onclick="changeFontSize(-1)">A−</button>
    <button class="icon-btn" onclick="changeFontSize(1)">A+</button>
    <button class="icon-btn" onclick="toggleMirrorScript()" title="Mirror teks">⟺</button>
  </div>

  <div class="tbdiv"></div>

  <!-- camera toggle -->
  <button class="btn btn-cam" id="btnCamToggle" onclick="toggleCam()">📷 Kamera</button>

  <!-- camera layout picker (visible when cam on) -->
  <div class="cam-layout-tabs" id="camLayoutTabs">
    <button class="cam-layout-tab active" id="ltSplit" onclick="setCamLayout('split')" title="Portrait - kamera bawah">⬇ Bawah</button>
    <button class="cam-layout-tab" id="ltSide" onclick="setCamLayout('side')" title="Landscape - kamera kanan">▶ Samping</button>
    <button class="cam-layout-tab" id="ltPip" onclick="setCamLayout('pip')" title="Pop-up mini">⧉ PIP</button>
  </div>

  <div class="tbdiv"></div>

  <button class="btn btn-purple" onclick="openEditor()">✏ Edit</button>
  <button class="btn btn-ghost"  onclick="doReset()">↩</button>
  <button class="btn btn-primary" id="btnStart" onclick="doStart()">▶ Mulai</button>
  <button class="btn btn-danger"  id="btnStop"  onclick="doStop()" style="display:none">■ Stop</button>
</div>

<!-- ROOT LAYOUT -->
<div class="root-layout" id="rootLayout">

  <!-- TELEPROMPTER PANEL -->
  <div class="prompt-panel" id="promptPanel">
    <div class="status-bar">
      <div class="status-dot" id="dot"></div>
      <div class="status-text" id="statusTxt">Siap — tekan Mulai</div>
      <div class="waveform" id="waveform">
        <div class="wave-bar"></div><div class="wave-bar"></div>
        <div class="wave-bar"></div><div class="wave-bar"></div>
      </div>
      <div class="heard-text" id="heardTxt"></div>
      <div class="prog-wrap">
        <div class="prog-bg"><div class="prog-fill" id="progFill"></div></div>
        <div class="prog-pct" id="progPct">0%</div>
      </div>
    </div>

    <div class="fade-top"></div>
    <div class="fade-bot"></div>
    <div class="focus-line" id="focusLine"></div>

    <div class="scroll-wrap" id="scrollWrap">
      <div class="script-area">
        <div class="script-content" id="scriptEl"></div>
      </div>
    </div>

    <div class="editor-overlay" id="editorEl">
      <div class="editor-title">✏ Edit Naskah</div>
      <textarea class="editor-ta" id="editorTa"></textarea>
      <div class="editor-acts">
        <button class="btn btn-danger" onclick="closeEditor()">Batal</button>
        <button class="btn btn-save"   onclick="saveScript()">Simpan</button>
      </div>
    </div>
  </div>

  <!-- RESIZE HANDLE (injected between prompt & cam for split/side) -->
  <div class="resize-handle" id="resizeHandle" style="display:none"></div>

  <!-- CAMERA PANEL -->
  <div class="cam-panel" id="camPanel">
    <video id="camVideo" autoplay playsinline muted></video>

    <div class="cam-off" id="camOff">
      <div class="cam-off-icon">📷</div>
      <div>Ketuk untuk aktifkan kamera</div>
      <button class="cam-btn" onclick="startCamera()" style="pointer-events:all;margin-top:4px">Aktifkan</button>
    </div>

    <div class="cam-overlay">
      <div class="rec-badge" id="recBadge"><div class="rec-dot"></div> REC</div>
      <div class="rec-timer" id="recTimer">00:00</div>

      <div class="cam-bar">
        <button class="cam-btn" id="btnFlipCam" onclick="flipCamera()" style="display:none">🔄 Balik</button>
        <button class="cam-btn" id="btnMirrorCam" onclick="toggleMirrorCam()">↔ Mirror</button>
        <button class="rec-btn" id="recBtn" onclick="toggleRecord()"></button>
        <a class="download-btn" id="downloadLink" download="rekaman.webm">⬇ Simpan</a>
        <button class="cam-btn" onclick="stopCamera()">✕</button>
      </div>

      <!-- PIP hover controls -->
      <div class="pip-controls" id="pipControls">
        <button class="pip-btn" onclick="toggleRecord()" id="pipRecBtn" title="Record">⏺</button>
        <button class="pip-btn" onclick="flipCamera()" title="Balik">🔄</button>
        <button class="pip-btn" onclick="stopCamera()" title="Matikan">✕</button>
      </div>
    </div>
  </div>

</div><!-- root-layout -->

<script>
'use strict';

/* ── DEMO ─────────────────────────────────────────────────────────────────── */
const DEMO = `Selamat datang di Teleprompter Pro.

Ini adalah naskah contoh yang bisa kamu ganti dengan teks apapun melalui tombol Edit di pojok atas.

Teleprompter ini memiliki dua mode gulir. Mode Suara akan mendeteksi kata-kata yang kamu ucapkan dan secara otomatis menggeser naskah mengikuti ucapanmu. Mode Kecepatan Tetap akan menggulir teks secara otomatis dengan kecepatan yang bisa kamu atur sendiri.

Aktifkan kamera dengan tombol Kamera di toolbar. Kamu bisa memilih tampilan kamera di bawah layar, di samping, atau sebagai jendela kecil melayang.

Tekan tombol Mulai untuk memulai. Selamat berbicara!`;

/* ── STATE ────────────────────────────────────────────────────────────────── */
let scriptRaw  = DEMO, wordTokens = [], curIdx = 0;
let mode       = 'speech', running = false;
let fontSize   = 2.2, scriptMirrored = false;
let rafId      = null, recog = null;
let speedPx    = 60, sensitivity = 5;

// Camera
let camOn      = false, camLayout = 'split';
let camStream  = null, mediaRecorder = null;
let recordedChunks = [], recInterval = null, recSeconds = 0;
let facingMode = 'user', camMirrored = true;

/* ── INIT ─────────────────────────────────────────────────────────────────── */
renderScript();

/* ── RENDER ───────────────────────────────────────────────────────────────── */
function renderScript() {
  const el = document.getElementById('scriptEl');
  const tokens = scriptRaw.split(/(\s+)/);
  wordTokens = [];
  let html = '', wi = 0;
  tokens.forEach(tok => {
    if (/\S/.test(tok)) {
      html += '<span class="w upcoming" id="w' + wi + '">' + esc(tok) + '</span>';
      wordTokens.push(tok); wi++;
    } else { html += tok; }
  });
  el.innerHTML = html; curIdx = 0; updateProgress();
}
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* ── SCROLL MODE ──────────────────────────────────────────────────────────── */
function setMode(m) {
  if (running) doStop(); mode = m;
  document.getElementById('tabSpeech').classList.toggle('active', m==='speech');
  document.getElementById('tabFixed').classList.toggle('active', m==='fixed');
  document.getElementById('speedGroup').style.display = m==='fixed' ? 'flex' : 'none';
  document.getElementById('sensGroup').style.display  = m==='speech' ? 'flex' : 'none';
}
function onSpeedChange() { speedPx = +document.getElementById('speedSlider').value; document.getElementById('speedVal').textContent = speedPx; }
function onSensChange()  { sensitivity = +document.getElementById('sensSlider').value; document.getElementById('sensVal').textContent = sensitivity; }

/* ── FONT / MIRROR ────────────────────────────────────────────────────────── */
function changeFontSize(d) {
  fontSize = Math.max(0.8, Math.min(5, fontSize + d * 0.2));
  document.getElementById('scriptEl').style.fontSize = fontSize + 'rem';
}
function toggleMirrorScript() {
  scriptMirrored = !scriptMirrored;
  document.getElementById('scriptEl').style.transform = scriptMirrored ? 'scaleX(-1)' : '';
}

/* ── EDITOR ───────────────────────────────────────────────────────────────── */
function openEditor()  { if (running) doStop(); document.getElementById('editorTa').value = scriptRaw; document.getElementById('editorEl').classList.add('open'); }
function closeEditor() { document.getElementById('editorEl').classList.remove('open'); }
function saveScript()  {
  const v = document.getElementById('editorTa').value.trim();
  scriptRaw = v || DEMO; renderScript(); closeEditor(); doReset();
}

/* ── RESET ────────────────────────────────────────────────────────────────── */
function doReset() {
  if (running) doStop(); curIdx = 0;
  document.getElementById('scrollWrap').scrollTop = 0;
  highlightAll(); updateProgress();
  setStatus('Siap — tekan Mulai'); setDot('idle');
}

/* ── START / STOP ─────────────────────────────────────────────────────────── */
function doStart() {
  running = true;
  document.getElementById('btnStart').style.display = 'none';
  document.getElementById('btnStop').style.display  = '';
  document.getElementById('focusLine').classList.add('show');
  if (mode === 'fixed') startFixed(); else startSpeech();
}
function doStop() {
  running = false;
  document.getElementById('btnStart').style.display = '';
  document.getElementById('btnStop').style.display  = 'none';
  document.getElementById('focusLine').classList.remove('show');
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  if (recog)  { try { recog.stop(); } catch(e){} recog = null; }
  document.getElementById('waveform').classList.remove('wave-active');
  document.getElementById('heardTxt').textContent = '';
  setDot('idle'); setStatus('Berhenti');
}

/* ── FIXED SCROLL ─────────────────────────────────────────────────────────── */
function startFixed() {
  setDot('scrolling'); setStatus('Menggulir…');
  const wrap = document.getElementById('scrollWrap'); let last = null;
  function tick(ts) {
    if (!running) return;
    if (last === null) last = ts;
    const dt = Math.min((ts - last) / 1000, 0.05); last = ts;
    wrap.scrollTop += speedPx * dt;
    syncHighlightToScroll(); updateProgress();
    if (wrap.scrollTop >= wrap.scrollHeight - wrap.clientHeight - 2) {
      doStop(); setDot('done'); setStatus('Selesai ✓'); return;
    }
    rafId = requestAnimationFrame(tick);
  }
  rafId = requestAnimationFrame(tick);
}

function syncHighlightToScroll() {
  const wrap = document.getElementById('scrollWrap');
  const wr   = wrap.getBoundingClientRect();
  const tY   = wr.top + wrap.clientHeight * 0.40;
  const from = Math.max(0, curIdx - 3);
  const to   = Math.min(wordTokens.length - 1, curIdx + 40);
  let bi = curIdx, bd = Infinity;
  for (let i = from; i <= to; i++) {
    const el = document.getElementById('w' + i); if (!el) continue;
    const r  = el.getBoundingClientRect();
    const d  = Math.abs(r.top + r.height / 2 - tY);
    if (d < bd) { bd = d; bi = i; }
  }
  if (bi !== curIdx) { curIdx = bi; highlightAll(); }
}

/* ── SPEECH ───────────────────────────────────────────────────────────────── */
function startSpeech() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert('Gunakan Chrome atau Edge untuk fitur suara.'); doStop(); return; }
  setDot('listening'); setStatus('Mendengarkan…');
  document.getElementById('waveform').classList.add('wave-active');
  recog = new SR(); recog.lang='id-ID'; recog.continuous=true; recog.interimResults=true;
  recog.onresult = e => {
    let t = ''; for (let i=e.resultIndex;i<e.results.length;i++) t+=e.results[i][0].transcript;
    t=t.trim(); if(!t) return;
    document.getElementById('heardTxt').textContent = '🎙 '+t; matchSpeech(t);
  };
  recog.onerror = e => { if(e.error==='no-speech'||e.error==='aborted') return; setStatus('Error: '+e.error); };
  recog.onend   = () => { if(running&&mode==='speech'&&recog) try{recog.start();}catch(e){} };
  try { recog.start(); } catch(err) { alert('Gagal akses mikrofon: '+err.message); doStop(); }
}

function matchSpeech(heard) {
  const hw = heard.toLowerCase().split(/\s+/).map(norm).filter(Boolean);
  if (!hw.length) return;
  const sw = wordTokens.map(norm);
  const to = Math.min(sw.length-1, curIdx + Math.round(10+sensitivity*8));
  let bp=-1, bs=0;
  for (let si=curIdx; si<=to; si++) {
    let m=0; for(let hi=0;hi<hw.length&&si+hi<sw.length;hi++) if(sw[si+hi]===hw[hi]) m++;
    const s=m/hw.length; if(s>bs&&s>=.25){bs=s;bp=si+hw.length-1;}
  }
  if (bp>curIdx) { curIdx=Math.min(bp,wordTokens.length-1); highlightAll(); scrollToWord(curIdx); updateProgress(); }
}
function norm(w) { return w.replace(/[^a-z0-9]/gi,'').toLowerCase(); }

function scrollToWord(idx) {
  const wrap=document.getElementById('scrollWrap'), el=document.getElementById('w'+idx); if(!el) return;
  const wr=wrap.getBoundingClientRect(), er=el.getBoundingClientRect();
  wrap.scrollTop = Math.max(0, er.top-wr.top+wrap.scrollTop - wrap.clientHeight*.40);
}

function highlightAll() {
  document.querySelectorAll('.w').forEach((el,i)=>{
    el.className='w';
    if(i<curIdx) el.classList.add('spoken');
    else if(i===curIdx) el.classList.add('current');
    else el.classList.add('upcoming');
  });
}
function updateProgress() {
  const p = wordTokens.length>1 ? Math.round(curIdx/(wordTokens.length-1)*100) : 0;
  document.getElementById('progFill').style.width = p+'%';
  document.getElementById('progPct').textContent  = p+'%';
}
function setStatus(msg) { document.getElementById('statusTxt').textContent = msg; }
function setDot(t) {
  const d=document.getElementById('dot'); d.className='status-dot';
  if(t!=='idle') d.classList.add(t);
}

/* ══════════════════════════════════════════════════════════════════════════
   CAMERA SYSTEM
══════════════════════════════════════════════════════════════════════════ */

/* ── TOGGLE CAM PANEL ─────────────────────────────────────────────────────── */
function toggleCam() {
  camOn = !camOn;
  const btn = document.getElementById('btnCamToggle');
  const tabs = document.getElementById('camLayoutTabs');
  if (camOn) {
    btn.classList.add('cam-on');
    btn.textContent = '📷 Kamera ✓';
    tabs.classList.add('show');
    applyCamLayout(camLayout);
  } else {
    btn.classList.remove('cam-on');
    btn.textContent = '📷 Kamera';
    tabs.classList.remove('show');
    clearCamLayout();
    stopCamera();
  }
}

/* ── LAYOUT ───────────────────────────────────────────────────────────────── */
function setCamLayout(l) {
  camLayout = l;
  ['ltSplit','ltSide','ltPip'].forEach(id => document.getElementById(id).classList.remove('active'));
  document.getElementById('lt'+l.charAt(0).toUpperCase()+l.slice(1)).classList.add('active');
  if (camOn) applyCamLayout(l);
}

function applyCamLayout(l) {
  const root   = document.getElementById('rootLayout');
  const handle = document.getElementById('resizeHandle');

  // remove old layout classes
  root.classList.remove('cam-split','cam-side','cam-pip');

  if (l === 'split') {
    root.classList.add('cam-split');
    // put cam AFTER prompt (below)
    root.appendChild(handle);
    root.appendChild(document.getElementById('camPanel'));
    handle.style.display = '';
    initResize('vertical');
  } else if (l === 'side') {
    root.classList.add('cam-side');
    root.appendChild(handle);
    root.appendChild(document.getElementById('camPanel'));
    handle.style.display = '';
    initResize('horizontal');
  } else if (l === 'pip') {
    root.classList.add('cam-pip');
    // cam sits inside root but absolute
    root.appendChild(document.getElementById('camPanel'));
    handle.style.display = 'none';
    initPipDrag();
  }
}

function clearCamLayout() {
  const root = document.getElementById('rootLayout');
  root.classList.remove('cam-split','cam-side','cam-pip');
  document.getElementById('resizeHandle').style.display = 'none';
}

/* ── RESIZE (split/side) ──────────────────────────────────────────────────── */
function initResize(dir) {
  const handle   = document.getElementById('resizeHandle');
  const camPanel = document.getElementById('camPanel');
  // remove old listeners by cloning
  const newHandle = handle.cloneNode(true);
  handle.parentNode.replaceChild(newHandle, newHandle);

  let dragging=false, startPos=0, startSize=0;

  function onDown(e) {
    dragging=true; startPos = dir==='vertical' ? (e.touches?e.touches[0].clientY:e.clientY) : (e.touches?e.touches[0].clientX:e.clientX);
    startSize = dir==='vertical' ? camPanel.offsetHeight : camPanel.offsetWidth;
    newHandle.classList.add('dragging'); e.preventDefault();
  }
  function onMove(e) {
    if (!dragging) return;
    const pos = dir==='vertical' ? (e.touches?e.touches[0].clientY:e.clientY) : (e.touches?e.touches[0].clientX:e.clientX);
    const delta = startPos - pos; // inverted: drag up = bigger cam
    const max   = dir==='vertical' ? window.innerHeight*.75 : window.innerWidth*.6;
    const min   = 80;
    const newSize = Math.max(min, Math.min(max, startSize + delta));
    if (dir==='vertical') camPanel.style.height = newSize+'px';
    else camPanel.style.width = newSize+'px';
    e.preventDefault();
  }
  function onUp() { dragging=false; newHandle.classList.remove('dragging'); }

  newHandle.addEventListener('mousedown',  onDown, {passive:false});
  newHandle.addEventListener('touchstart', onDown, {passive:false});
  window.addEventListener('mousemove',  onMove, {passive:false});
  window.addEventListener('touchmove',  onMove, {passive:false});
  window.addEventListener('mouseup',  onUp);
  window.addEventListener('touchend', onUp);
}

/* ── PIP DRAG ─────────────────────────────────────────────────────────────── */
function initPipDrag() {
  const pip = document.getElementById('camPanel');
  // reset position
  pip.style.right = '16px'; pip.style.bottom = '24px';
  pip.style.left = ''; pip.style.top = '';
  let dragging=false, ox=0, oy=0;

  pip.onmousedown = pip.ontouchstart = function(e) {
    // don't drag when clicking buttons
    if (e.target.tagName==='BUTTON'||e.target.tagName==='A') return;
    dragging=true;
    const t = e.touches ? e.touches[0] : e;
    const r = pip.getBoundingClientRect();
    ox = t.clientX - r.left; oy = t.clientY - r.top;
    e.preventDefault();
  };
  window.addEventListener('mousemove', onPipMove, {passive:false});
  window.addEventListener('touchmove', onPipMove, {passive:false});
  window.addEventListener('mouseup',  ()=>dragging=false);
  window.addEventListener('touchend', ()=>dragging=false);

  function onPipMove(e) {
    if (!dragging) return;
    const t = e.touches ? e.touches[0] : e;
    const root = document.getElementById('rootLayout').getBoundingClientRect();
    let x = t.clientX - root.left - ox;
    let y = t.clientY - root.top  - oy;
    x = Math.max(0, Math.min(root.width  - pip.offsetWidth,  x));
    y = Math.max(0, Math.min(root.height - pip.offsetHeight, y));
    pip.style.left=''; pip.style.right='';
    pip.style.top=''; pip.style.bottom='';
    pip.style.left = x+'px'; pip.style.top = y+'px';
    e.preventDefault();
  }
}

/* ── CAMERA ───────────────────────────────────────────────────────────────── */
async function startCamera() {
  try {
    const cs = { video:{ facingMode, width:{ideal:1280}, height:{ideal:720} }, audio:true };
    camStream = await navigator.mediaDevices.getUserMedia(cs);
    document.getElementById('camVideo').srcObject = camStream;
    document.getElementById('camOff').style.display    = 'none';
    document.getElementById('btnFlipCam').style.display = '';
    applyCamMirror();
  } catch(err) { alert('Gagal mengakses kamera: '+err.message); }
}

function stopCamera() {
  if (mediaRecorder&&mediaRecorder.state!=='inactive') stopRecord();
  if (camStream) { camStream.getTracks().forEach(t=>t.stop()); camStream=null; }
  document.getElementById('camVideo').srcObject = null;
  document.getElementById('camOff').style.display    = 'flex';
  document.getElementById('btnFlipCam').style.display = 'none';
  document.getElementById('recBtn').classList.remove('recording');
}

async function flipCamera() {
  facingMode = facingMode==='user' ? 'environment' : 'user';
  if (camStream) {
    const wasRec = mediaRecorder&&mediaRecorder.state==='recording';
    if (wasRec) stopRecord();
    camStream.getTracks().forEach(t=>t.stop());
    await startCamera();
  }
}

function toggleMirrorCam() {
  camMirrored = !camMirrored; applyCamMirror();
  document.getElementById('btnMirrorCam').classList.toggle('active', camMirrored);
}
function applyCamMirror() {
  const p = document.getElementById('camPanel');
  if (camMirrored) p.classList.add('cam-mirror'); else p.classList.remove('cam-mirror');
}

/* ── RECORD ───────────────────────────────────────────────────────────────── */
function toggleRecord() {
  if (!camStream) { alert('Aktifkan kamera dulu.'); return; }
  if (mediaRecorder&&mediaRecorder.state==='recording') stopRecord(); else startRecord();
}

function startRecord() {
  recordedChunks=[];
  const mimes=['video/webm;codecs=vp9,opus','video/webm;codecs=vp8,opus','video/webm','video/mp4'];
  const mime=mimes.find(m=>MediaRecorder.isTypeSupported(m))||'';
  try { mediaRecorder=new MediaRecorder(camStream, mime?{mimeType:mime}:{}); }
  catch(e) { mediaRecorder=new MediaRecorder(camStream); }
  mediaRecorder.ondataavailable = e=>{ if(e.data.size>0) recordedChunks.push(e.data); };
  mediaRecorder.onstop = onRecordStop;
  mediaRecorder.start(500);
  document.getElementById('recBtn').classList.add('recording');
  document.getElementById('recBadge').classList.add('show');
  document.getElementById('recTimer').classList.add('show');
  document.getElementById('downloadLink').classList.remove('show');
  recSeconds=0; updateTimer();
  recInterval=setInterval(()=>{recSeconds++;updateTimer();},1000);
}

function stopRecord() {
  if(!mediaRecorder||mediaRecorder.state==='inactive') return;
  mediaRecorder.stop(); clearInterval(recInterval);
  document.getElementById('recBtn').classList.remove('recording');
  document.getElementById('recBadge').classList.remove('show');
}

function onRecordStop() {
  const ext  = recordedChunks[0]?.type?.includes('mp4') ? 'mp4' : 'webm';
  const blob = new Blob(recordedChunks, {type: recordedChunks[0]?.type||'video/webm'});
  const url  = URL.createObjectURL(blob);
  const a    = document.getElementById('downloadLink');
  a.href=url; a.download='rekaman.'+ext; a.classList.add('show');
}

function updateTimer() {
  const m=String(Math.floor(recSeconds/60)).padStart(2,'0');
  const s=String(recSeconds%60).padStart(2,'0');
  document.getElementById('recTimer').textContent=m+':'+s;
}
